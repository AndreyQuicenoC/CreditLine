name: Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Validate & Test

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: creditline_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: 'frontend/package-lock.json'

    - name: Backend - Install dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Backend - Run tests
      env:
        DATABASE_NAME: creditline_test
        DATABASE_USER: postgres
        DATABASE_PASSWORD: postgres
        DATABASE_HOST: localhost
        DATABASE_PORT: 5432
        DEBUG: 'True'
      run: |
        cd backend
        python manage.py migrate
        python manage.py test apps.users.tests 2>&1 | head -50

    - name: Frontend - Install dependencies
      run: |
        cd frontend
        npm ci

    - name: Frontend - Build
      run: |
        cd frontend
        npm run build

    - name: Frontend - Verify build
      run: |
        cd frontend
        test -d dist && echo "✓ Frontend build successful" || exit 1

    - name: Generate deployment summary
      run: |
        echo "## Deployment Validation Report" > deployment-summary.md
        echo "" >> deployment-summary.md
        echo "### Backend" >> deployment-summary.md
        echo "✓ Tests passed" >> deployment-summary.md
        echo "" >> deployment-summary.md
        echo "### Frontend" >> deployment-summary.md
        echo "✓ Build successful" >> deployment-summary.md
        echo "- Build size: $(du -sh frontend/dist | cut -f1)" >> deployment-summary.md
        cat deployment-summary.md

  build-and-push:
    needs: validate
    runs-on: ubuntu-latest
    name: Build & Push
    if: success()

    steps:
    - uses: actions/checkout@v3

    - name: Build artifacts
      run: |
        echo "Building artifacts..."
        mkdir -p artifacts
        cd frontend
        npm ci
        npm run build
        cd ..
        cp -r frontend/dist artifacts/frontend
        cp -r backend artifacts/backend

    - name: Create build archive
      run: |
        cd artifacts
        tar -czf creditline-build-$(date +%Y%m%d-%H%M%S).tar.gz frontend backend
        ls -lh *.tar.gz

    - name: Upload build artifacts
      uses: actions/upload-artifact@v3
      with:
        name: build-artifacts
        path: artifacts/*.tar.gz
        retention-days: 30
